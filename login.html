<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<!-- Main Container -->
<main class="w-full max-w-md flex flex-col gap-stack-lg">
<!-- Header / Branding -->
<div class="flex flex-col items-center justify-center gap-stack-sm text-center">
<div class="w-24 h-24 rounded-full bg-surface-container-highest border-2 border-primary flex items-center justify-center mb-stack-sm overflow-hidden">
<img alt="Official Emblem" class="w-full h-full object-cover" data-alt="A stylized, official-looking emblem or crest suitable for a government agricultural department. The emblem features subtle botanical elements like wheat or leaves, rendered in solid, high-contrast greens and deep gold tones against a bright white background. The design is flat, rugged, and minimalist, conveying authority and reliability for a field officer portal." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2FEWihaPIy17IsA3OOtAGghO1XX4Q1iG9ThbP2J3bpp17M0OAVro5jayR2Yvgl6eZFzhYYlHGIJyqoKSSULa_YmkKbPa5Zg-KzczsvUi-BJYZW6pjCOceO9HpgM61KJobfC30FGetZursZcMxLpf8n4Psn5XT65Z2cYsmWWcf0yXXPCXjORHiFEV_XEv4NR3iTrqBpONCsFpjiR29qv9vzmvv5lg8cnnW1XjYZ7tJgh4mRBFsJmwb8XyxVQAaAdbbRkBGNhTwc1U"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary">KrishiNetra Field App</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure Government Officer Portal</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-md md:p-stack-lg flex flex-col gap-stack-md shadow-sm">
<!-- Officer ID Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-bold text-label-bold text-on-surface" for="officer-id">Officer ID</label>
<div class="relative w-full">
<span aria-hidden="true" class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">badge</span>
<input class="w-full h-touch-target-min pl-10 pr-4 rounded-DEFAULT border border-outline bg-surface font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="officer-id" placeholder="e.g. AGRI-9920" type="text"/>
</div>
</div>
<!-- Password / OTP Input -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface" for="auth-code">Password / OTP</label>
<a class="font-label-bold text-label-bold text-primary hover:text-primary-container transition-colors" href="#">Need Help?</a>
</div>
<div class="relative w-full">
<span aria-hidden="true" class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">lock</span>
<input class="w-full h-touch-target-min pl-10 pr-12 rounded-DEFAULT border border-outline bg-surface font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="auth-code" placeholder="Enter secure code" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors h-full flex items-center" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Warning Notice (Rugged status indicator style) -->
<div class="mt-unit bg-error-container border-l-4 border-error p-3 rounded-r-DEFAULT flex items-start gap-3">
<span aria-hidden="true" class="material-symbols-outlined text-error">warning</span>
<p class="font-body-md text-body-md text-on-error-container text-sm">
                    Ensure your device is connected to a secure network before proceeding.
                </p>
</div>
<!-- Submit Action -->
<button class="w-full h-touch-target-min mt-unit bg-primary hover:bg-primary-container active:scale-[0.98] text-on-primary font-label-bold text-label-bold rounded-DEFAULT flex items-center justify-center gap-2 transition-all shadow-sm">
<span aria-hidden="true" class="material-symbols-outlined">login</span>
                Authenticate &amp; Access
            </button>
</div>
<!-- Footer / Security Badge -->
<div class="flex flex-col items-center justify-center mt-stack-md opacity-70">
<span aria-hidden="true" class="material-symbols-outlined text-outline text-3xl mb-1">gpp_good</span>
<p class="font-body-md text-body-md text-outline text-center text-sm">
                Department of Agricultural Governance<br/>
                System usage is monitored and recorded.
            </p>
</div>
