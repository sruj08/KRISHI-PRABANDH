                    <span class="material-symbols-outlined text-primary text-4xl">location_on</span>
                </div>
            </div>
        </div>

        <div class="space-y-2">
            <label class="font-bold">Add Notes</label>
            <textarea class="w-full border-2 rounded-xl p-4 min-h-[120px]" placeholder="Enter observational notes..."></textarea>
        </div>

        <button class="w-full bg-primary text-white py-4 rounded-xl font-bold shadow-lg">SUBMIT VERIFICATION</button>

    <script src="./src/i18n.js"></script>
