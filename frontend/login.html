<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KrishiNetra Field App - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="./src/styles/style.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#0d631b",
                        "secondary": "#7e5700",
                        "background": "#f7fbf0",
                        "surface": "#f7fbf0",
                        "on-surface": "#181d17",
                        "outline": "#707a6c",
                        "error": "#ba1a1a"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
    <main class="w-full max-w-md flex flex-col gap-8">
        <div class="flex flex-col items-center text-center gap-4">
            <div class="w-24 h-24 rounded-full border-2 border-primary flex items-center justify-center overflow-hidden">
                <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2FEWihaPIy17IsA3OOtAGghO1XX4Q1iG9ThbP2J3bpp17M0OAVro5jayR2Yvgl6eZFzhYYlHGIJyqoKSSULa_YmkKbPa5Zg-KzczsvUi-BJYZW6pjCOceO9HpgM61KJobfC30FGetZursZcMxLpf8n4Psn5XT65Z2cYsmWWcf0yXXPCXjORHiFEV_XEv4NR3iTrqBpONCsFpjiR29qv9vzmvv5lg8cnnW1XjYZ7tJgh4mRBFsJmwb8XyxVQAaAdbbRkBGNhTwc1U" class="w-full h-full object-cover">
            </div>
            <h1 class="text-3xl font-bold text-primary">KrishiNetra Field App</h1>
            <p class="text-neutral-600">Secure Government Officer Portal</p>
        </div>

        <div class="bg-white border p-8 rounded-xl shadow-sm space-y-6">
            <div class="space-y-2">
                <label class="font-bold">Officer ID</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400">badge</span>
                    <input type="text" class="w-full pl-10 pr-4 py-2 border rounded-lg" placeholder="e.g. AGRI-9920">
                </div>
            </div>

            <div class="space-y-2">
                <label class="font-bold">Password / OTP</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400">lock</span>
                    <input type="password" class="w-full pl-10 pr-4 py-2 border rounded-lg" placeholder="Enter secure code">
                </div>
            </div>

            <button onclick="window.location.href='index.html'" class="w-full bg-primary text-white py-3 rounded-lg font-bold flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">login</span> Authenticate & Access
            </button>
        </div>
    </main>
    <script src="./src/i18n.js"></script>
</body>
</html>
