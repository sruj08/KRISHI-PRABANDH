<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Field Verification - Camera</title>

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                    "spacing": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-black text-on-surface font-body-md antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Screen Container: Full height, relative for absolute positioning of overlays -->
<main class="relative h-[884px] w-full flex flex-col justify-between">
<!-- Live Camera Feed Placeholder -->
<div class="absolute inset-0 w-full h-full z-0 bg-inverse-surface">
<img alt="Camera Viewfinder" class="w-full h-full object-cover opacity-90" data-alt="A first-person view looking through a digital camera viewfinder at a patch of healthy, bright green agricultural crops. The scene is illuminated by harsh, direct natural sunlight, typical of a midday field inspection. The image has a slightly gritty, raw texture to simulate a live feed on a ruggedized mobile device, framed by the dark edges of the interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4C9lPiUwJ8ywiGUPRyMxhFZfGPt5PTAwsUpkAh90EwHg-NJI1pY2h2taovibYP725IR1rCa7XHBG0wq4Qz8K22ClFAj9xc85QDHqajzmUsFetz-8D2cKISngX3iBdjoPSGGXtwEc2eA90fPXQUzcYGwE69GDIXXsBIt6w1ZovRplGVxmq7gO_cBSbZAHfko-u7M3E-sa6zbHHeUgLNzUZZ62Z0Ff4zq3cLQQxxpzMyBOYXZxGNZMUYTSIIl8QKTrkjJExnh9oiCI"/>
<!-- Viewfinder Overlay Gradient for contrast at top/bottom -->
<div class="absolute inset-0 bg-gradient-to-b from-black/50 via-transparent to-black/60 pointer-events-none"></div>
</div>
<!-- Top Controls Overlay -->
<header class="relative w-full px-margin-mobile pt-margin-mobile pb-stack-md flex justify-between items-start z-10">
<!-- Close Action (Task-Focused Return) -->
<button aria-label="Close Camera" class="h-touch-target-min w-touch-target-min rounded-full bg-inverse-surface/40 backdrop-blur-md flex items-center justify-center text-inverse-on-surface border border-outline-variant/30 active:bg-inverse-surface/60 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<!-- Verification Status Badge -->
<div class="bg-surface/90 backdrop-blur-md px-4 py-2 rounded-full border border-surface-variant shadow-sm flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-label-bold text-label-bold text-on-surface">Align subject in frame</span>
</div>
<!-- Flash Toggle -->
<button aria-label="Toggle Flash" class="h-touch-target-min w-touch-target-min rounded-full bg-inverse-surface/40 backdrop-blur-md flex items-center justify-center text-inverse-on-surface border border-outline-variant/30 active:bg-inverse-surface/60 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">flash_auto</span>
</button>
</header>
<!-- Center Reticle / Guide -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10">
<div class="w-[70%] max-w-sm aspect-[3/4] border-2 border-primary/70 rounded-lg relative flex items-center justify-center">
<!-- Corner markers for rugged feel -->
<div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<!-- Center focal point -->
<span class="material-symbols-outlined text-primary/50 text-4xl" style="font-variation-settings: 'FILL' 0;">add</span>
</div>
</div>
<!-- Bottom Hardware Control Panel -->
<footer class="relative w-full bg-surface-container rounded-t-xl pb-8 pt-stack-md px-margin-mobile flex items-center justify-between z-20 border-t border-surface-variant shadow-[0_-4px_20px_rgba(0,0,0,0.1)]">
<!-- Retake Action -->
<button class="flex flex-col items-center justify-center gap-2 min-w-[80px] h-touch-target-min active:opacity-70 transition-opacity">
<div class="w-12 h-12 rounded-full bg-surface-container-high border border-outline-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">replay</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface-variant">Retake</span>
</button>
<!-- Primary Capture Button (Rugged & Prominent) -->
<div class="relative flex items-center justify-center">
<!-- Outer Ring -->
<div class="w-20 h-20 rounded-full border-4 border-primary bg-surface flex items-center justify-center p-1 shadow-md">
<!-- Inner Active Button -->
<button aria-label="Capture Photo" class="w-full h-full rounded-full bg-primary flex items-center justify-center text-on-primary shadow-inner active:scale-95 active:bg-primary-container transition-all duration-100">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
</div>
<!-- Upload / Confirm Action -->
<button class="flex flex-col items-center justify-center gap-2 min-w-[80px] h-touch-target-min active:opacity-70 transition-opacity">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container shadow-sm border border-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">cloud_upload</span>
</div>
<span class="font-label-bold text-label-bold text-primary">Upload</span>
</button>
</footer>
</main>
<script src="./src/i18n.js"></script>
</body></html>
